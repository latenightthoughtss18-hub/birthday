<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>Happy Birthday Jess</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #f8d7e3;
    position: relative;
    font-family: Georgia, serif;
  }

  /* ── BACKGROUND ── */
  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, #fce4ec 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, #f8bbd0 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, #fce4ec 0%, #f9b8cd 60%, #e8a1b8 100%);
  }

  /* ── BOKEH BLOBS ── */
  .bokeh {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.25;
    animation: bokehFloat 8s ease-in-out infinite alternate;
  }
  .bokeh1 { width:400px;height:400px;background:#ff8fb0;left:-80px;top:100px;animation-delay:0s; }
  .bokeh2 { width:300px;height:300px;background:#ff6d9d;right:-60px;top:500px;animation-delay:1.5s; }
  .bokeh3 { width:350px;height:350px;background:#ffd6e7;left:50px;bottom:300px;animation-delay:3s; }
  .bokeh4 { width:250px;height:250px;background:#ff4d8d;right:100px;bottom:150px;animation-delay:2s; }

  @keyframes bokehFloat {
    from { transform: translateY(0px) scale(1); }
    to   { transform: translateY(-30px) scale(1.05); }
  }

  /* ── BLOSSOM PETALS (bg layer) ── */
  .petal {
    position: absolute;
    width: 18px;
    height: 22px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity: 0;
    animation: petalFall linear infinite;
  }

  @keyframes petalFall {
    0%   { transform: translateY(-40px) rotate(0deg) translateX(0px); opacity: 0; }
    5%   { opacity: 0.7; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(1960px) rotate(720deg) translateX(80px); opacity: 0; }
  }

  /* ── FAIRY LIGHTS ── */
  .lights-row {
    position: absolute;
    width: 100%;
    left: 0;
    display: flex;
    justify-content: space-around;
    align-items: flex-start;
  }
  .lights-top { top: 0; }
  .lights-mid { top: 600px; }

  .bulb-wire {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .wire { width: 1px; background: rgba(200,150,100,0.4); }
  .bulb {
    width: 10px;
    height: 14px;
    border-radius: 50% 50% 40% 40%;
    animation: shimmer 2s ease-in-out infinite alternate;
    position: relative;
  }
  .bulb::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    opacity: 0.3;
    animation: glow 2s ease-in-out infinite alternate;
  }

  @keyframes shimmer {
    from { opacity: 0.5; }
    to   { opacity: 1; }
  }
  @keyframes glow {
    from { box-shadow: 0 0 8px 4px var(--gc); opacity:0.2; }
    to   { box-shadow: 0 0 18px 10px var(--gc); opacity:0.55; }
  }

  /* ── BUTTERFLIES ── */
  .butterfly {
    position: absolute;
    width: 70px;
    height: 50px;
    opacity: 0;
    animation: bflyMove linear infinite;
  }

  .wing-left, .wing-right {
    position: absolute;
    top: 0;
    width: 30px;
    height: 40px;
    border-radius: 60% 40% 60% 40%;
    animation: wingFlap 0.22s ease-in-out infinite alternate;
    background: radial-gradient(ellipse, #ff8fb0 0%, #ff4d8d 60%, transparent 100%);
    opacity: 0.85;
  }
  .wing-left  { left: 0;  transform-origin: right center; }
  .wing-right { right: 0; border-radius: 40% 60% 40% 60%; transform-origin: left center; }

  @keyframes wingFlap {
    from { transform: scaleX(1) rotateY(0deg); }
    to   { transform: scaleX(0.35) rotateY(60deg); }
  }

  @keyframes bflyMove {
    0%   { opacity:0; transform: translate(0,0) rotate(0deg); }
    5%   { opacity:0.8; }
    95%  { opacity:0.7; }
    100% { opacity:0; transform: translate(var(--bx), var(--by)) rotate(var(--br)); }
  }

  /* ── CAMERA ZOOM SCENE ── */
  .scene {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: zoomOut 8s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
  }

  @keyframes zoomOut {
    0%   { transform: scale(1.35); opacity: 0.6; }
    15%  { opacity: 1; }
    100% { transform: scale(1);    opacity: 1; }
  }

  /* ── POSTER ── */
  .poster-wrap {
    position: relative;
    width: 820px;
    z-index: 10;
    animation: posterReveal 8s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
  }

  @keyframes posterReveal {
    0%   { transform: scale(0.75) translateY(40px); opacity: 0; filter: blur(12px); }
    20%  { opacity: 0.3; }
    50%  { opacity: 1; filter: blur(2px); }
    100% { transform: scale(1) translateY(0px); opacity: 1; filter: blur(0px); }
  }

  .poster-wrap img {
    width: 100%;
    border-radius: 28px;
    display: block;
    box-shadow:
      0 0 60px 20px rgba(255,140,180,0.5),
      0 0 120px 40px rgba(255,100,150,0.25),
      0 30px 80px rgba(0,0,0,0.2);
  }

  /* Soft glow overlay on poster */
  .poster-glow {
    position: absolute;
    inset: -10px;
    border-radius: 38px;
    background: radial-gradient(ellipse at 50% 20%,
      rgba(255,220,240,0.35) 0%,
      rgba(255,180,210,0.15) 40%,
      transparent 70%);
    animation: glowPulse 3s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes glowPulse {
    from { opacity: 0.6; }
    to   { opacity: 1; }
  }

  /* text shimmer lines on poster */
  .text-shimmer {
    position: absolute;
    inset: 0;
    border-radius: 28px;
    background: linear-gradient(
      135deg,
      transparent 30%,
      rgba(255,255,255,0.08) 45%,
      rgba(255,255,255,0.12) 50%,
      rgba(255,255,255,0.08) 55%,
      transparent 70%
    );
    animation: shimmerSlide 4s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes shimmerSlide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
  }

  /* ── SPARKLES ── */
  .sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #fff;
    animation: sparkleAnim 2.5s ease-in-out infinite;
  }
  @keyframes sparkleAnim {
    0%,100% { transform: scale(0); opacity:0; }
    50%      { transform: scale(1); opacity:1; box-shadow: 0 0 8px 4px rgba(255,255,200,0.9); }
  }
</style>
</head>

<div class="bg"></div>

<!-- Bokeh blobs -->
<div class="bokeh bokeh1"></div>
<div class="bokeh bokeh2"></div>
<div class="bokeh bokeh3"></div>
<div class="bokeh bokeh4"></div>

<!-- Petals -->
<script>
(function(){
  var colors = ['#ff8fb0','#ffb3cc','#ff6d9d','#ffd6e7','#ff4d8d','#ffe0ef','#e8a1b8'];
  for(var i=0;i<28;i++){
    var p=document.createElement('div');
    p.className='petal';
    p.style.left=(Math.random()*1080)+'px';
    p.style.top=(-20)+'px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.transform='rotate('+(Math.random()*360)+'deg)';
    var dur=(12+Math.random()*14).toFixed(1)+'s';
    var delay=(Math.random()*16).toFixed(1)+'s';
    p.style.animation='petalFall '+dur+' '+delay+' linear infinite';
    document.body.appendChild(p);
  }
})();
</script>

<!-- Fairy lights top -->
<div class="lights-row lights-top" id="ltop"></div>
<!-- Fairy lights mid -->
<div class="lights-row lights-mid" id="lmid"></div>

<script>
(function(){
  var bulbColors=[
    '#ffb3cc','#ff8fb0','#ffd700','#ff6d9d','#fff0b3','#ff4d8d','#ffe066','#ffccdd'
  ];
  function makeLights(id,count){
    var row=document.getElementById(id);
    for(var i=0;i<count;i++){
      var bw=document.createElement('div');
      bw.className='bulb-wire';
      var wire=document.createElement('div');
      wire.className='wire';
      wire.style.height=(20+Math.random()*30)+'px';
      var b=document.createElement('div');
      b.className='bulb';
      var c=bulbColors[i%bulbColors.length];
      b.style.background=c;
      b.style.setProperty('--gc',c);
      b.style.animationDelay=(Math.random()*2)+'s';
      bw.appendChild(wire);
      bw.appendChild(b);
      row.appendChild(bw);
    }
  }
  makeLights('ltop',28);
  makeLights('lmid',22);
})();
</script>

<!-- Butterflies -->
<script>
(function(){
  var paths=[
    {x:'-1150px',y:'200px',r:'-20deg',dur:'22s',delay:'1s',sx:'1100px',sy:'600px'},
    {x:'1200px',y:'-100px',r:'15deg',dur:'25s',delay:'4s',sx:'-80px',sy:'900px'},
    {x:'600px',y:'-900px',r:'-45deg',dur:'30s',delay:'8s',sx:'200px',sy:'1600px'},
    {x:'-900px',y:'500px',r:'30deg',dur:'20s',delay:'12s',sx:'900px',sy:'300px'},
    {x:'700px',y:'400px',r:'-10deg',dur:'28s',delay:'2s',sx:'100px',sy:'1100px'},
  ];
  paths.forEach(function(p){
    var bf=document.createElement('div');
    bf.className='butterfly';
    bf.style.left=p.sx;
    bf.style.top=p.sy;
    bf.style.setProperty('--bx',p.x);
    bf.style.setProperty('--by',p.y);
    bf.style.setProperty('--br',p.r);
    bf.style.animationDuration=p.dur;
    bf.style.animationDelay=p.delay;
    var wl=document.createElement('div');wl.className='wing-left';
    var wr=document.createElement('div');wr.className='wing-right';
    bf.appendChild(wl);bf.appendChild(wr);
    document.body.appendChild(bf);
  });
})();
</script>

<script>
(function(){

    {x:90,y:200},{x:990,y:150},{x:120,y:700},{x:970,y:650},

    s.style.left=p.x+'px';
    s.style.top=p.y+'px';
    s.style.animationDelay=(i*0.35).toFixed(1)+'s';

  });
})();
